name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Restore embedded source
        run: |
          echo "Decoding embedded project..."
          echo '' | base64 -d > src.tgz
          mkdir -p _src
          tar -xzf src.tgz -C _src
          ls -la _src
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Build APK
        working-directory: _src
        run: |
          STAMP="$(TZ=Europe/Sofia date +'%Y-%m-%d %H:%M') · билд ${{ github.run_number }}"
          echo "Stamp: $STAMP"
          sed -i "s|__STAMP__|$STAMP|" app/src/main/java/com/its22/vhodtaksi/Model.kt
          grep APP_VERSION app/src/main/java/com/its22/vhodtaksi/Model.kt
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        id: tag
        working-directory: _src
        run: |
          TAG="$(TZ=Europe/Sofia date +%Y-%m-%d_%H-%M)_build${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/Vxod_${TAG}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: Vxod_${{ steps.tag.outputs.tag }}
          path: _src/out/Vxod_${{ steps.tag.outputs.tag }}.apk
          if-no-files-found: error
