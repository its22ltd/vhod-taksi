name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip latest project
        run: |
          ZIP=$(ls Vxod_*.zip | sort | tail -1)
          echo "Building from: $ZIP"
          rm -rf _src && unzip -oq "$ZIP" -d _src
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Build APK
        working-directory: _src/vhod-taksi
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        id: tag
        working-directory: _src/vhod-taksi
        run: |
          TAG="$(TZ=Europe/Sofia date +%Y-%m-%d_%H-%M)_build${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/Vxod_${TAG}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: Vxod_${{ steps.tag.outputs.tag }}
          path: _src/vhod-taksi/out/Vxod_${{ steps.tag.outputs.tag }}.apk
          if-no-files-found: error
